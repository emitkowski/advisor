services:
    laravel.test:
        build:
            context: './vendor/laravel/sail/runtimes/8.5'
            dockerfile: Dockerfile
            args:
                WWWGROUP: '${WWWGROUP}'
        image: 'sail-8.5/app'
        extra_hosts:
            - 'host.docker.internal:host-gateway'
        ports:
            - '${VITE_PORT:-5173}:${VITE_PORT:-5173}'
        environment:
            WWWUSER: '${WWWUSER}'
            LARAVEL_SAIL: 1
            XDEBUG_MODE: '${SAIL_XDEBUG_MODE:-off}'
            XDEBUG_CONFIG: '${SAIL_XDEBUG_CONFIG:-client_host=host.docker.internal}'
            IGNITION_LOCAL_SITES_PATH: '${PWD}'
            VIRTUAL_HOST: '${APP_DOMAIN}'
            VIRTUAL_PORT: '80'
        volumes:
            - '.:/var/www/html'
        networks:
            - sail
            - nginx-proxy
            - mysql-shared
            - redis-shared
            - mailpit-shared
networks:
    sail:
        driver: bridge
    nginx-proxy:
        external: true
    mysql-shared:
        external: true
    redis-shared:
        external: true
    mailpit-shared:
        external: true
